<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>查寝情况汇报系统</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.5.1/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', Arial, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        .header { text-align: center; color: white; margin-bottom: 30px; }
        .header h1 { font-size: 2.5rem; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        .header p { font-size: 1.1rem; opacity: 0.9; }
        
        .online-badge { display: inline-block; padding: 5px 15px; border-radius: 20px; font-size: 0.9rem; margin-top: 10px; }
        .online-badge.online { background: rgba(76, 175, 80, 0.2); color: #4caf50; }
        .online-badge.offline { background: rgba(255, 193, 7, 0.2); color: #ffc107; }
        
        .main-content { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; margin-bottom: 30px; }
        
        .community-card { background: white; border-radius: 15px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); transition: transform 0.3s, box-shadow 0.3s; }
        .community-card:hover { transform: translateY(-5px); box-shadow: 0 15px 40px rgba(0,0,0,0.15); }
        .community-card.submitted { background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%); border: 2px solid #81c784; }
        
        .community-header { display: flex; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px solid #eee; }
        .community-icon { width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: bold; color: white; margin-right: 15px; }
        .community-1 { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .community-2 { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
        .community-3 { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
        .community-4 { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); }
        .community-5 { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); }
        .community-6 { background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%); }
        
        .community-title h2 { color: #333; font-size: 1.4rem; }
        .community-title p { color: #888; font-size: 0.9rem; margin-top: 2px; }
        
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 8px; color: #555; font-weight: 500; }
        .form-group input { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 1rem; transition: border-color 0.3s; }
        .form-group input:focus { outline: none; border-color: #667eea; }
        .form-group input[type="number"] { max-width: 120px; }
        .form-group textarea { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 1rem; resize: vertical; min-height: 80px; transition: border-color 0.3s; }
        .form-group textarea:focus { outline: none; border-color: #667eea; }
        
        .submit-btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: transform 0.3s, box-shadow 0.3s; }
        .submit-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4); }
        .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        
        .summary-section { background: white; border-radius: 15px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .summary-header { display: flex; align-items: center; margin-bottom: 25px; padding-bottom: 20px; border-bottom: 2px solid #eee; }
        .summary-header h2 { color: #333; font-size: 1.8rem; margin-right: 15px; }
        .summary-header .update-time { color: #888; font-size: 0.9rem; }
        
        .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .summary-card { background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); border-radius: 12px; padding: 20px; text-align: center; }
        .summary-card .number { font-size: 2.5rem; font-weight: bold; color: #667eea; margin-bottom: 5px; }
        .summary-card .label { color: #666; font-size: 0.95rem; }
        
        .community-list { margin-top: 20px; }
        .community-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; background: #f8f9fa; border-radius: 8px; margin-bottom: 10px; }
        .community-item:last-child { margin-bottom: 0; }
        .community-item .name { font-weight: 600; color: #333; }
        .community-item .status { display: flex; gap: 15px; font-size: 0.9rem; }
        .community-item .status span { padding: 4px 10px; border-radius: 20px; background: #e8f5e9; color: #2e7d32; }
        .community-item .status .absent { background: #ffebee; color: #c62828; }
        .community-item .status .leave { background: #fff3e0; color: #ef6c00; }
        
        .toast { position: fixed; top: 20px; right: 20px; padding: 15px 25px; border-radius: 8px; color: white; font-weight: 500; z-index: 1000; opacity: 0; transform: translateX(100%); transition: all 0.3s ease; }
        .toast.show { opacity: 1; transform: translateX(0); }
        .toast.success { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); }
        .toast.warning { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); }
        
        .reset-btn { background: #f44336; margin-top: 20px; }
        .reset-btn:hover { box-shadow: 0 5px 20px rgba(244, 67, 54, 0.4); }
        
        @media (max-width: 768px) {
            .header h1 { font-size: 1.8rem; }
            .main-content { grid-template-columns: 1fr; }
            .summary-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏠 查寝情况汇报系统</h1>
            <p>各社区长独立提交，数据实时同步汇总</p>
            <div class="online-badge offline" id="connectionStatus">连接中...</div>
        </div>
        
        <div class="main-content">
            <div class="community-card" data-community="1">
                <div class="community-header"><div class="community-icon community-1">1</div><div class="community-title"><h2>第一社区</h2><p>社区长提交入口</p></div></div>
                <div class="form-group"><label>总人数</label><input type="number" class="total" placeholder="请输入总人数"></div>
                <div class="form-group"><label>未在校人数</label><input type="number" class="absent" placeholder="请输入未在校人数"></div>
                <div class="form-group"><label>走读人员</label><textarea class="commuter" placeholder="走读人员姓名，用换行分隔"></textarea></div>
                <div class="form-group"><label>请假人数</label><input type="number" class="leave" placeholder="请输入请假人数"></div>
                <button class="submit-btn" data-community="1">提交汇报</button>
            </div>
            <div class="community-card" data-community="2">
                <div class="community-header"><div class="community-icon community-2">2</div><div class="community-title"><h2>第二社区</h2><p>社区长提交入口</p></div></div>
                <div class="form-group"><label>总人数</label><input type="number" class="total" placeholder="请输入总人数"></div>
                <div class="form-group"><label>未在校人数</label><input type="number" class="absent" placeholder="请输入未在校人数"></div>
                <div class="form-group"><label>走读人员</label><textarea class="commuter" placeholder="走读人员姓名，用换行分隔"></textarea></div>
                <div class="form-group"><label>请假人数</label><input type="number" class="leave" placeholder="请输入请假人数"></div>
                <button class="submit-btn" data-community="2">提交汇报</button>
            </div>
            <div class="community-card" data-community="3">
                <div class="community-header"><div class="community-icon community-3">3</div><div class="community-title"><h2>第三社区</h2><p>社区长提交入口</p></div></div>
                <div class="form-group"><label>总人数</label><input type="number" class="total" placeholder="请输入总人数"></div>
                <div class="form-group"><label>未在校人数</label><input type="number" class="absent" placeholder="请输入未在校人数"></div>
                <div class="form-group"><label>走读人员</label><textarea class="commuter" placeholder="走读人员姓名，用换行分隔"></textarea></div>
                <div class="form-group"><label>请假人数</label><input type="number" class="leave" placeholder="请输入请假人数"></div>
                <button class="submit-btn" data-community="3">提交汇报</button>
            </div>
            <div class="community-card" data-community="4">
                <div class="community-header"><div class="community-icon community-4">4</div><div class="community-title"><h2>第四社区</h2><p>社区长提交入口</p></div></div>
                <div class="form-group"><label>总人数</label><input type="number" class="total" placeholder="请输入总人数"></div>
                <div class="form-group"><label>未在校人数</label><input type="number" class="absent" placeholder="请输入未在校人数"></div>
                <div class="form-group"><label>走读人员</label><textarea class="commuter" placeholder="走读人员姓名，用换行分隔"></textarea></div>
                <div class="form-group"><label>请假人数</label><input type="number" class="leave" placeholder="请输入请假人数"></div>
                <button class="submit-btn" data-community="4">提交汇报</button>
            </div>
            <div class="community-card" data-community="5">
                <div class="community-header"><div class="community-icon community-5">5</div><div class="community-title"><h2>第五社区</h2><p>社区长提交入口</p></div></div>
                <div class="form-group"><label>总人数</label><input type="number" class="total" placeholder="请输入总人数"></div>
                <div class="form-group"><label>未在校人数</label><input type="number" class="absent" placeholder="请输入未在校人数"></div>
                <div class="form-group"><label>走读人员</label><textarea class="commuter" placeholder="走读人员姓名，用换行分隔"></textarea></div>
                <div class="form-group"><label>请假人数</label><input type="number" class="leave" placeholder="请输入请假人数"></div>
                <button class="submit-btn" data-community="5">提交汇报</button>
            </div>
            <div class="community-card" data-community="6">
                <div class="community-header"><div class="community-icon community-6">6</div><div class="community-title"><h2>第六社区</h2><p>社区长提交入口</p></div></div>
                <div class="form-group"><label>总人数</label><input type="number" class="total" placeholder="请输入总人数"></div>
                <div class="form-group"><label>未在校人数</label><input type="number" class="absent" placeholder="请输入未在校人数"></div>
                <div class="form-group"><label>走读人员</label><textarea class="commuter" placeholder="走读人员姓名，用换行分隔"></textarea></div>
                <div class="form-group"><label>请假人数</label><input type="number" class="leave" placeholder="请输入请假人数"></div>
                <button class="submit-btn" data-community="6">提交汇报</button>
            </div>
        </div>
        
        <div class="summary-section">
            <div class="summary-header"><h2>📊 汇总统计</h2><span class="update-time" id="updateTime">最后更新：--</span></div>
            <div class="summary-grid">
                <div class="summary-card"><div class="number" id="totalStudents">0</div><div class="label">总人数</div></div>
                <div class="summary-card"><div class="number" id="totalPresent">0</div><div class="label">在校人数</div></div>
                <div class="summary-card"><div class="number" id="totalAbsent">0</div><div class="label">未在校人数</div></div>
                <div class="summary-card"><div class="number" id="totalLeave">0</div><div class="label">请假人数</div></div>
            </div>
            <h3 style="margin-bottom: 15px; color: #333;">各社区提交情况</h3>
            <div class="community-list" id="communityList">
                <div class="community-item"><span class="name">第一社区</span><span class="status">未提交</span></div>
                <div class="community-item"><span class="name">第二社区</span><span class="status">未提交</span></div>
                <div class="community-item"><span class="name">第三社区</span><span class="status">未提交</span></div>
                <div class="community-item"><span class="name">第四社区</span><span class="status">未提交</span></div>
                <div class="community-item"><span class="name">第五社区</span><span class="status">未提交</span></div>
                <div class="community-item"><span class="name">第六社区</span><span class="status">未提交</span></div>
            </div>
            <button class="submit-btn reset-btn" onclick="resetAll()">重置所有数据</button>
        </div>
    </div>
    <div class="toast" id="toast"></div>
    
    <script>
        var communities = {};
        var socket = null;
        var isConnected = false;
        
        function getServerUrl() {
            var params = new URLSearchParams(window.location.search);
            var serverParam = params.get('server');
            if (serverParam) {
                return serverParam;
            }
            if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
                return 'http://localhost:3000';
            }
            return window.location.origin;
        }
        
        var SERVER_URL = getServerUrl();
        
        function showToast(message, type) {
            if (type === undefined) type = 'success';
            var toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type + ' show';
            setTimeout(function() { toast.classList.remove('show'); }, 3000);
        }
        
        function updateConnectionStatus(connected) {
            var statusEl = document.getElementById('connectionStatus');
            isConnected = connected;
            if (connected) {
                statusEl.textContent = '✅ 已连接 - 数据实时同步';
                statusEl.className = 'online-badge online';
            } else {
                statusEl.textContent = '❌ 离线模式';
                statusEl.className = 'online-badge offline';
            }
        }
        
        function connectSocket() {
            socket = io(SERVER_URL, {
                transports: ['websocket', 'polling'],
                reconnection: true,
                reconnectionDelay: 1000,
                reconnectionDelayMax: 5000
            });
            
            socket.on('connect', function() {
                updateConnectionStatus(true);
                showToast('已连接到服务器，数据实时同步');
            });
            
            socket.on('disconnect', function() {
                updateConnectionStatus(false);
                showToast('与服务器断开连接', 'warning');
            });
            
            socket.on('connect_error', function() {
                updateConnectionStatus(false);
                showToast('无法连接服务器，使用本地模式', 'warning');
            });
            
            socket.on('initialData', function(data) {
                Object.assign(communities, data);
                updateUI();
            });
            
            socket.on('dataUpdate', function(data) {
                Object.assign(communities, data);
                updateUI();
                showToast('数据已更新', 'success');
            });
        }
        
        function submitReport(communityId) {
            var card = document.querySelector('[data-community="' + communityId + '"]');
            var total = parseInt(card.querySelector('.total').value) || 0;
            var absent = parseInt(card.querySelector('.absent').value) || 0;
            var commuter = card.querySelector('.commuter').value.trim();
            var leave = parseInt(card.querySelector('.leave').value) || 0;
            
            if (total === 0) {
                showToast('请输入总人数', 'warning');
                return;
            }
            
            var reportData = {
                communityId: communityId,
                total: total,
                absent: absent,
                commuter: commuter || '-',
                leave: leave,
                submitted: true
            };
            
            communities[communityId] = reportData;
            card.classList.add('submitted');
            card.querySelector('.submit-btn').textContent = '已提交';
            updateUI();
            
            if (isConnected && socket) {
                socket.emit('submitReport', reportData);
                showToast('第' + communityId + '社区汇报提交成功！');
            } else {
                showToast('第' + communityId + '社区汇报已保存（离线模式）', 'warning');
            }
        }
        
        function updateUI() {
            var totalStudents = 0, totalAbsent = 0, totalLeave = 0;
            
            for (var i = 1; i <= 6; i++) {
                if (communities[i]) {
                    totalStudents += communities[i].total;
                    totalAbsent += communities[i].absent;
                    totalLeave += communities[i].leave;
                    
                    var card = document.querySelector('[data-community="' + i + '"]');
                    if (card && communities[i].submitted) {
                        card.classList.add('submitted');
                        card.querySelector('.submit-btn').textContent = '已提交';
                        card.querySelector('.total').value = communities[i].total;
                        card.querySelector('.absent').value = communities[i].absent;
                        card.querySelector('.commuter').value = communities[i].commuter;
                        card.querySelector('.leave').value = communities[i].leave;
                    }
                }
            }
            
            document.getElementById('totalStudents').textContent = totalStudents;
            document.getElementById('totalPresent').textContent = totalStudents - totalAbsent;
            document.getElementById('totalAbsent').textContent = totalAbsent;
            document.getElementById('totalLeave').textContent = totalLeave;
            
            var communityList = document.getElementById('communityList');
            communityList.innerHTML = '';
            var names = ['第一社区', '第二社区', '第三社区', '第四社区', '第五社区', '第六社区'];
            
            for (var i = 1; i <= 6; i++) {
                var item = document.createElement('div');
                item.className = 'community-item';
                var nameSpan = document.createElement('span');
                nameSpan.className = 'name';
                nameSpan.textContent = names[i - 1];
                
                var statusSpan = document.createElement('span');
                statusSpan.className = 'status';
                
                if (communities[i]) {
                    var totalSpan = document.createElement('span');
                    totalSpan.textContent = '总' + communities[i].total + '人';
                    statusSpan.appendChild(totalSpan);
                    
                    if (communities[i].absent > 0) {
                        var absentSpan = document.createElement('span');
                        absentSpan.className = 'absent';
                        absentSpan.textContent = '未在校' + communities[i].absent + '人';
                        statusSpan.appendChild(absentSpan);
                    }
                    if (communities[i].leave > 0) {
                        var leaveSpan = document.createElement('span');
                        leaveSpan.className = 'leave';
                        leaveSpan.textContent = '请假' + communities[i].leave + '人';
                        statusSpan.appendChild(leaveSpan);
                    }
                } else {
                    statusSpan.textContent = '未提交';
                }
                
                item.appendChild(nameSpan);
                item.appendChild(statusSpan);
                communityList.appendChild(item);
            }
            
            document.getElementById('updateTime').textContent = '最后更新：' + new Date().toLocaleString('zh-CN');
        }
        
        function resetAll() {
            if (!confirm('确定要重置所有社区的汇报数据吗？')) return;
            
            for (var i = 1; i <= 6; i++) {
                var card = document.querySelector('[data-community="' + i + '"]');
                card.classList.remove('submitted');
                card.querySelector('.total').value = '';
                card.querySelector('.absent').value = '';
                card.querySelector('.commuter').value = '';
                card.querySelector('.leave').value = '';
                card.querySelector('.submit-btn').textContent = '提交汇报';
            }
            
            Object.keys(communities).forEach(function(key) { delete communities[key]; });
            
            if (isConnected && socket) {
                socket.emit('resetAll');
            }
            
            updateUI();
            showToast('所有数据已重置');
        }
        
        document.querySelectorAll('.submit-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                submitReport(this.getAttribute('data-community'));
            });
        });
        
        connectSocket();
    </script>
</body>
</html>
